<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexaMarket STATS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

/* HEADER */
header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 30px;
    border-bottom:2px solid #00ff66;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 15px #00ff66;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    font-size:26px;
    font-weight:bold;
    color:#00ff66;
    text-shadow:0 0 10px #00ff66;
}

/* TOTAL BOX */
.total{
    border:1px solid #00ff66;
    padding:10px 15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,102,0.2);
}

.total span{
    display:block;
    color:#00ff66;
    font-size:22px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    width:95%;
    max-width:1100px;
    margin:40px auto;
}

/* CARD GRAPH */
.card{
    background:#0a0a0a;
    border:2px solid #00ff66;
    border-radius:20px;
    padding:25px;
    height:600px;
    box-shadow:0 0 25px rgba(0,255,102,0.15);
}

canvas{
    width:100% !important;
    height:100% !important;
}

</style>

</head>

<body>

<header>

<div class="left">

<div class="logo">
<img src="https://i.ibb.co/fGGkb8Dj/IMG-2347.jpg">
</div>

<div class="title">
NexaMarket STATS
</div>

</div>

<div class="total">
TOTAL GAGNÉ
<span>25 €</span>
</div>

</header>


<div class="container">

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>


<script>

const ctx = document.getElementById("chart");

new Chart(ctx, {

type: "line",

data: {

labels: ["Jour 1","Jour 2","Jour 3","Jour 4","Jour 5","Jour 6","Jour 7"],

datasets: [{

label: "Gains (€)",

data: [25, null, null, null, null, null, null],

borderColor: "#00ff66",
backgroundColor: "rgba(0,255,102,0.15)",

pointRadius: 8,
pointHoverRadius: 10,

pointBackgroundColor: "#00ff66",
pointBorderColor: "#00ff66",

borderWidth: 4,
tension: 0.4,

spanGaps: false,

fill: true

}]

},

options: {

responsive: true,
maintainAspectRatio: false,

plugins: {
legend: {
labels: {
color: "#00ff66"
}
}
},

scales: {

x: {
ticks: { color: "#00ff66" },
grid: { color: "rgba(0,255,102,0.1)" }
},

y: {
beginAtZero: true,
max: 100,

ticks: { color: "#00ff66" },
grid: { color: "rgba(0,255,102,0.1)" }
}

}

}

});

</script>

</body>
</html>
