<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexaMarket STATS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    display:flex;
    align-items:center;
    padding:20px;
}

.logo{
    width:65px;
    height:65px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 20px #00ff66;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    margin-left:15px;
    font-size:30px;
    font-weight:bold;
    color:#00ff66;
    text-shadow:0 0 15px #00ff66;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#0b0b0b;
    border:2px solid #00ff66;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,255,102,0.25);
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="https://i.ibb.co/fGGkb8Dj/IMG-2347.jpg">
</div>

<div class="title">
NexaMarket STATS
</div>

</header>

<div class="container">

<div class="card">

<canvas id="graph"></canvas>

</div>

</div>


<script>

new Chart(document.getElementById("graph"),{

type:"line",

data:{

labels:[
"Jour 1",
"Jour 2",
"Jour 3",
"Jour 4",
"Jour 5"
],

datasets:[{

label:"Bénéfices (€)",

data:[
25,
null,
null,
null,
null
],

borderColor:"#00ff66",

backgroundColor:"rgba(0,255,102,0.2)",

fill:true,

tension:0.4,

pointRadius:6,

pointBackgroundColor:"#00ff66"

}]

},

options:{

plugins:{
legend:{
labels:{
color:"white"
}
}
},

scales:{

x:{
ticks:{
color:"#00ff66"
},
grid:{
color:"#1f1f1f"
}
},

y:{
beginAtZero:true,

ticks:{
color:"#00ff66"
},

grid:{
color:"#1f1f1f"
}
}

}

}

});

</script>

</body>
</html>
