<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexaMarket STATS</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    display:flex;
    align-items:center;
    padding:20px;
}

.logo{
    width:65px;
    height:65px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 15px #00ff66;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    margin-left:15px;
    font-size:30px;
    font-weight:bold;
    color:#00ff66;
    text-shadow:0 0 10px #00ff66;
}

.container{
    padding:20px;
}

.graph{
    position:relative;
    width:90%;
    max-width:900px;
    height:450px;
    margin-top:30px;

    border-left:3px solid #00ff66;
    border-bottom:3px solid #00ff66;
}

/* Ligne montante */

.line{
    position:absolute;

    left:0;
    bottom:0;

    width:140px;
    height:140px;

    border-top:4px solid #00ff66;

    transform:
    translateY(-95px)
    rotate(-35deg);

}


.point{

position:absolute;

left:130px;
bottom:95px;

width:14px;
height:14px;

background:#00ff66;

border-radius:50%;

box-shadow:0 0 15px #00ff66;

}


.euro{

position:absolute;
left:-45px;

color:#00ff66;

font-size:14px;

}


.day{

position:absolute;

bottom:-30px;

color:#00ff66;

font-size:14px;

}


</style>

</head>

<body>


<header>

<div class="logo">

<img src="https://i.ibb.co/fGGkb8Dj/IMG-2347.jpg">

</div>


<div class="title">

NexaMarket STATS

</div>

</header>



<div class="container">


<div class="graph">


<div class="line"></div>

<div class="point"></div>


<div class="euro" style="bottom:95px;">
25€
</div>


<div class="day" style="left:115px;">
Jour 1
</div>


<div class="day" style="left:260px;">
Jour 2
</div>


<div class="day" style="left:400px;">
Jour 3
</div>


<div class="day" style="left:540px;">
Jour 4
</div>


<div class="day" style="left:680px;">
Jour 5
</div>


</div>


</div>


</body>

</html>
